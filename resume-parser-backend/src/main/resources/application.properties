spring.application.name=resume-parser

# Database configuration (MySQL)
# Note: Ensure MySQL is running on port 3306. Change username/password if needed.
spring.datasource.url=jdbc:mysql://localhost:3306/resume_parser?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Properties (dialect will be auto-detected based on database connection)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File upload configuration (max 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
